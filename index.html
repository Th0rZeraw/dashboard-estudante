<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EstudoFlow | Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #000000; --bg2: #0d0d0d; --surface: #141414; --card: #111111; --border: #262626; --border2: #404040;
            --green: #4ade80; --green-bg: rgba(74,222,128,.1);
            --red: #f87171; --red-bg: rgba(248,113,113,.1);
            --accent: #ffffff; --text: #f5f5f5; --text2: #a3a3a3; --text3: #777777;
            --radius-lg: 10px;
        }
        
        body {
            font-family:'DM Sans',sans-serif; background-color:#0a0a0a; color:var(--text); 
            min-height:100vh; transition: background 0.3s; background-size: cover; background-position: center; background-attachment: fixed;
        }

        #bg-overlay { position: fixed; inset: 0; background: black; z-index: -1; pointer-events: none; }
        ::placeholder { color: #888 !important; opacity: 1; }
        
        .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; }
        .input { 
            background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--text); 
            padding:.6rem .8rem; width:100%; outline:none; font-size: 14px;
        }
        .input:focus { border-color: var(--text2); }

        .btn { 
            display:inline-flex; align-items:center; justify-content:center; gap:.5rem; font-weight:600;
            padding:.5rem 1rem; border-radius:6px; cursor:pointer; transition: 0.2s; font-size: 13px;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
        .btn-danger { color: var(--red); border: 1px solid rgba(248,113,113,0.1); }

        .topnav {
            position:sticky; top:0; z-index:50; background: rgba(10,10,10,0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 0.9rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
        }

        #auth-screen { position: fixed; inset: 0; z-index: 1000; background: #080808; display: flex; align-items: center; justify-content: center; }
        .avatar-box { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border2); overflow: hidden; background: var(--bg2); margin: 0 auto 1rem; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        .materia-tag { font-size: 9px; text-transform: uppercase; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .overlay.open { display: flex; }
        .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 100%; max-width: 450px; position: relative; }

        .error-msg { color: var(--red); font-size: 11px; font-weight: 600; margin-top: 8px; display: none; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 10px 12px; background: rgba(255,255,255,0.02); }
        td:first-child { border-radius: 8px 0 0 8px; }
        td:last-child { border-radius: 0 8px 8px 0; }

        @media (max-width: 768px) { .grid-main { grid-template-columns: 1fr !important; } }
    </style>
</head>
<body>

<div id="bg-overlay"></div>

<div id="auth-screen">
    <div class="card" style="width: 340px; text-align: center;">
        <h2 id="auth-title" style="font-size: 20px; font-weight: 700; margin-bottom: 0.5rem;">EstudoFlow</h2>
        <p id="auth-sub" style="font-size: 12px; color: var(--text3); margin-bottom: 1.5rem;">Faça login para acessar seus dados</p>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <input type="text" id="auth-user" class="input" placeholder="Seu usuário">
            <input type="password" id="auth-pass" class="input" placeholder="Sua senha">
            <button class="btn btn-primary" onclick="handleAuth()" id="btn-auth">Entrar</button>
            <button class="btn" style="font-size: 11px; color: var(--text3);" onclick="toggleAuth()">Registrar nova conta</button>
        </div>
    </div>
</div>

<div id="main-app" style="display: none;">
    <nav class="topnav">
        <div style="display: flex; align-items: center; gap: 8px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="34" height="34">
              <rect x="28" y="10" width="8" height="36" rx="1" fill="white" transform="rotate(-15 32 32)"/>
              <polygon points="28,46 36,46 32,54" fill="white" transform="rotate(-15 32 32)"/>
              <rect x="28" y="12" width="8" height="3" rx="0.5" fill="white" opacity="0.5" transform="rotate(-15 32 32)"/>
              <path d="M 18 22 Q 14 32, 18 42 Q 22 50, 28 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M 46 22 Q 50 32, 46 42 Q 42 50, 36 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="18" cy="20" r="2.5" fill="white"/>
              <circle cx="46" cy="20" r="2.5" fill="white"/>
              <path d="M 18 22 Q 25 18, 32 16 Q 39 18, 46 22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M 28 52 Q 32 56, 36 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="32" cy="56" r="4" fill="none" stroke="white" stroke-width="2.5"/>
              <circle cx="32" cy="56" r="1.5" fill="white"/>
            </svg>
            <span id="nav-brand" style="font-weight: 800; letter-spacing: 1.5px; font-size: 15px;">ESTUDOFLOW</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-ghost" onclick="openModal('modal-settings')"><i class="fas fa-sliders-h"></i></button>
            <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="grid-main" style="display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; max-width: 1200px; margin: 2rem auto; padding: 0 1rem;">
        <aside style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="card" style="text-align: center;">
                <div class="avatar-box">
                    <img id="display-avatar" src="">
                    <div id="avatar-ph" style="height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text3);"><i class="fas fa-user-graduate"></i></div>
                </div>
                <h3 id="display-name" style="font-weight: 700; font-size: 18px;">Augusto</h3>
                <p id="display-sub" style="font-size: 12px; color: var(--text2); margin-bottom: 1rem;">▸ vestibulando</p>
                <div style="background: var(--bg2); height: 6px; border-radius: 10px; overflow: hidden;">
                    <div id="xp-bar" style="height: 100%; background: var(--accent); width: 0%; transition: 0.5s;"></div>
                </div>
                <div id="xp-text" style="font-size: 9px; font-weight: 700; margin-top: 6px; color: var(--text3);">0% CONCLUÍDO</div>
            </div>

            <div class="card">
                <h4 style="font-size: 10px; font-weight: 800; color: var(--text3); text-transform: uppercase; margin-bottom: 1rem;">Atalhos</h4>
                <div id="links-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
                <button class="btn btn-ghost" style="width: 100%; margin-top: 1rem; font-size: 11px;" onclick="openModal('modal-link')">ADICIONAR LINK</button>
            </div>
        </aside>

        <main style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="card">
                <h4 style="font-size: 10px; font-weight: 800; color: var(--text3); text-transform: uppercase; margin-bottom: 1rem;">Adicionar Revisão</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1.5fr auto; gap: 10px;">
                    <input id="in-materia" class="input" placeholder="Matéria">
                    <input id="in-assunto" class="input" placeholder="Assunto">
                    <input id="in-link" class="input" placeholder="Link (opcional)">
                    <button class="btn btn-primary" onclick="addTask()"><i class="fas fa-plus"></i></button>
                </div>
                <p id="add-error" class="error-msg"><i class="fas fa-exclamation-circle"></i> Ops! Você precisa preencher Matéria e Assunto.</p>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h4 style="font-size: 10px; font-weight: 800; color: var(--red); text-transform: uppercase;">Prazos Pendentes</h4>
                    <select id="sort-pending" onchange="renderAll()" class="input" style="width: auto; height: 28px; padding: 0 8px; font-size: 11px; border-color: transparent;">
                        <option value="new">Novas primeiro</option>
                        <option value="old">Antigas primeiro</option>
                    </select>
                </div>
                <div id="empty-msg" style="text-align: center; padding: 2rem; color: var(--text3); font-size: 13px;">Nenhuma revisão pendente. Aproveite o descanso!</div>
                <table><tbody id="pending-body"></tbody></table>
            </div>

            <div class="card" style="opacity: 0.8;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h4 style="font-size: 10px; font-weight: 800; color: var(--green); text-transform: uppercase;">Concluídas</h4>
                    <select id="sort-history" onchange="renderAll()" class="input" style="width: auto; height: 28px; padding: 0 8px; font-size: 11px; border-color: transparent;">
                        <option value="new">Recentes primeiro</option>
                        <option value="old">Antigas primeiro</option>
                    </select>
                </div>
                <table><tbody id="done-body"></tbody></table>
            </div>
        </main>
    </div>
</div>

<div class="overlay" id="modal-settings">
    <div class="modal">
        <h3 style="font-weight: 700; margin-bottom: 1.5rem; font-size: 18px;">Personalização</h3>
        <div style="display: flex; flex-direction: column; gap: 1.2rem;">
            <div class="field">
                <label style="font-size: 9px; color: var(--text3); font-weight: 800;">NOME DO DASHBOARD</label>
                <input id="set-page-title" class="input">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="field">
                    <label style="font-size: 9px; color: var(--text3); font-weight: 800;">NOME DO USUÁRIO</label>
                    <input id="set-name" class="input">
                </div>
                <div class="field">
                    <label style="font-size: 9px; color: var(--text3); font-weight: 800;">SUBTÍTULO</label>
                    <input id="set-sub" class="input">
                </div>
            </div>
            <div class="field">
                <label style="font-size: 9px; color: var(--text3); font-weight: 800;">FOTO DE PERFIL</label>
                <input type="file" id="file-input" style="display:none" accept="image/*" onchange="startCrop(event)">
                <button class="btn btn-ghost" style="width:100%" onclick="document.getElementById('file-input').click()">Carregar do PC</button>
            </div>
            <div class="field">
                <label style="font-size: 9px; color: var(--text3); font-weight: 800;">URL DA IMAGEM DE FUNDO</label>
                <input id="set-bg-url" class="input" placeholder="Cole o link da imagem aqui">
            </div>
            <div class="field">
                <label style="font-size: 9px; color: var(--text3); font-weight: 800;">OPACIDADE DO OVERLAY (<span id="opacity-val">60</span>%)</label>
                <input type="range" id="set-opacity" min="0" max="1" step="0.1" style="width: 100%; accent-color: white;">
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 2rem;">
            <button class="btn btn-ghost" onclick="closeModal('modal-settings')">Cancelar</button>
            <button class="btn btn-primary" onclick="saveSettings()">Salvar Alterações</button>
        </div>
    </div>
</div>

<div class="overlay" id="modal-cropper">
    <div class="modal">
        <h3 style="font-weight: 700; margin-bottom: 1rem;">Recortar Foto</h3>
        <div style="max-height: 300px; overflow: hidden; border-radius: 8px; margin-bottom: 1.5rem;">
            <img id="cropper-img" style="max-width: 100%;">
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="btn btn-ghost" onclick="closeModal('modal-cropper')">Cancelar</button>
            <button class="btn btn-primary" onclick="confirmCrop()">Aplicar</button>
        </div>
    </div>
</div>

<div class="overlay" id="modal-link">
    <div class="modal" style="max-width: 350px;">
        <button onclick="closeModal('modal-link')" style="position: absolute; left: 20px; top: 25px; color: var(--text3); font-size: 16px;">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h3 style="font-weight: 700; margin-bottom: 1.5rem; text-align: center;">Novo Link</h3>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <input id="link-name" class="input" placeholder="Nome do site">
            <input id="link-url" class="input" placeholder="URL (ex: google.com)">
            <button class="btn btn-primary" style="margin-top: 1rem;" onclick="addLink()">Salvar Atalho</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    let currentUser = null;
    let authMode = 'login';
    let cropper = null;
    let authToken = localStorage.getItem('EF_TOKEN');

    // --- API helpers ---
    async function api(method, path, body) {
        const opts = { method, headers: {} };
        if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
        if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
        const res = await fetch(path, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro no servidor');
        return data;
    }

    let saving = false;
    async function save() {
        if (saving) return;
        saving = true;
        try { await api('PUT', '/api/data', S); }
        catch(e) { console.error('Erro ao salvar:', e); }
        finally { saving = false; }
    }

    // --- Auth ---
    function toggleAuth() {
        authMode = authMode === 'login' ? 'reg' : 'login';
        document.getElementById('auth-title').innerText = authMode === 'login' ? 'EstudoFlow' : 'Nova Conta';
        document.getElementById('btn-auth').innerText = authMode === 'login' ? 'Entrar' : 'Criar Conta';
        document.getElementById('auth-sub').innerText = authMode === 'login' ? 'Faça login para acessar seus dados' : 'Crie uma nova conta para começar';
    }

    async function handleAuth() {
        const u = document.getElementById('auth-user').value.trim().toLowerCase();
        const p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return;
        const btn = document.getElementById('btn-auth');
        btn.disabled = true;
        btn.innerText = 'Carregando...';
        try {
            const res = await api('POST', '/api/auth', { username: u, password: p, action: authMode === 'reg' ? 'register' : 'login' });
            authToken = res.token;
            localStorage.setItem('EF_TOKEN', authToken);
            currentUser = res.username;
            S = res.data;
            enterApp();
        } catch(e) {
            alert(e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = authMode === 'login' ? 'Entrar' : 'Criar Conta';
        }
    }

    function enterApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        applyTheme();
        renderAll();
    }

    function logout() {
        localStorage.removeItem('EF_TOKEN');
        authToken = null;
        currentUser = null;
        S = null;
        location.reload();
    }

    // --- Auto-login on page load ---
    let S = null;
    (async function tryAutoLogin() {
        if (!authToken) return;
        try {
            const res = await api('GET', '/api/data');
            currentUser = res.username;
            S = res.data;
            enterApp();
        } catch(e) {
            localStorage.removeItem('EF_TOKEN');
            authToken = null;
        }
    })();

    // --- Theme ---
    function applyTheme() {
        document.getElementById('display-name').innerText = S.profile.name;
        document.getElementById('display-sub').innerText = S.profile.sub;
        document.title = S.profile.title || 'EstudoFlow';
        document.getElementById('nav-brand').innerText = (S.profile.title || 'EstudoFlow').toUpperCase();
        document.body.style.backgroundImage = S.profile.bg ? `url(${S.profile.bg})` : 'none';
        document.getElementById('bg-overlay').style.opacity = S.profile.opacity || 0.6;
        const img = document.getElementById('display-avatar');
        if(S.profile.avatar) { img.src = S.profile.avatar; img.style.display='block'; document.getElementById('avatar-ph').style.display='none'; }
        else { img.style.display='none'; document.getElementById('avatar-ph').style.display='flex'; }
    }

    // --- Tasks ---
    function addTask() {
        const m = document.getElementById('in-materia').value.trim(), a = document.getElementById('in-assunto').value.trim(), l = document.getElementById('in-link').value.trim();
        const error = document.getElementById('add-error');
        if(!m || !a) { error.style.display = 'block'; return; }
        error.style.display = 'none';
        S.revisions.push({ id: Date.now(), materia: m, assunto: a, link: l, done: false, date: new Date().toISOString() });
        document.getElementById('in-materia').value = ''; document.getElementById('in-assunto').value = ''; document.getElementById('in-link').value = '';
        save(); renderAll();
    }

    function renderAll() {
        const pending = S.revisions.filter(r => !r.done);
        const done = S.revisions.filter(r => r.done);
        const sPending = document.getElementById('sort-pending').value;
        const sHistory = document.getElementById('sort-history').value;

        pending.sort((a,b) => sPending === 'new' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date));
        done.sort((a,b) => sHistory === 'new' ? new Date(b.date) - new Date(a.date) : new Date(a.date) - new Date(b.date));

        document.getElementById('empty-msg').style.display = pending.length ? 'none' : 'block';
        document.getElementById('pending-body').innerHTML = pending.map(r => `
            <tr>
                <td width="90"><span class="materia-tag">${r.materia}</span></td>
                <td>
                    <div style="font-weight:700; font-size:14px;">${r.assunto}</div>
                    <div style="font-size:10px; color:var(--text3);">${new Date(r.date).toLocaleDateString('pt-BR')}</div>
                </td>
                <td width="30">${r.link ? `<a href="${r.link}" target="_blank" style="color:var(--text3)"><i class="fas fa-link"></i></a>` : ''}</td>
                <td width="90" style="text-align:right">
                    <button onclick="toggleTask(${r.id})" class="btn btn-ghost" style="padding:4px 8px; color:var(--green)"><i class="fas fa-check"></i></button>
                    <button onclick="delTask(${r.id})" class="btn btn-ghost" style="padding:4px 8px; margin-left:4px;"><i class="fas fa-trash-alt" style="font-size:10px"></i></button>
                </td>
            </tr>
        `).join('');

        document.getElementById('done-body').innerHTML = done.map(r => `
            <tr style="opacity:0.6;">
                <td width="80"><span class="materia-tag">${r.materia}</span></td>
                <td style="font-size:13px; font-weight:500;">${r.assunto}</td>
                <td style="text-align:right; width:80px;">
                    <button onclick="delTask(${r.id})" style="color:var(--text3); font-size:12px;"><i class="fas fa-times"></i></button>
                </td>
            </tr>
        `).join('');

        const pct = S.revisions.length ? Math.round((done.length / S.revisions.length) * 100) : 0;
        document.getElementById('xp-bar').style.width = pct + '%';
        document.getElementById('xp-text').innerText = pct + '% CONCLUÍDO';
        renderLinks();
    }

    function toggleTask(id) { S.revisions.find(r=>r.id===id).done = true; save(); renderAll(); }
    function delTask(id) { if(confirm("Deseja remover este registro?")) { S.revisions = S.revisions.filter(r=>r.id!==id); save(); renderAll(); } }

    // --- Links ---
    function addLink() {
        const n = document.getElementById('link-name').value, u = document.getElementById('link-url').value;
        if(!n || !u) return;
        S.links.push({name: n, url: u.startsWith('http') ? u : 'https://'+u});
        save(); renderAll(); closeModal('modal-link');
    }
    function renderLinks() {
        document.getElementById('links-container').innerHTML = S.links.map((l,i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--bg2); padding:8px 12px; border-radius:6px; border:1px solid var(--border);">
                <a href="${l.url}" target="_blank" style="font-size:12px; font-weight:500; color:var(--text); text-decoration:none;">${l.name}</a>
                <i class="fas fa-trash-alt" onclick="S.links.splice(${i},1);save();renderLinks();" style="font-size:10px; color:var(--text3); cursor:pointer;"></i>
            </div>
        `).join('');
    }

    // --- Crop / Settings ---
    function startCrop(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            document.getElementById('cropper-img').src = event.target.result;
            openModal('modal-cropper');
            if(cropper) cropper.destroy();
            setTimeout(() => { cropper = new Cropper(document.getElementById('cropper-img'), { aspectRatio: 1, viewMode: 1 }); }, 200);
        };
        reader.readAsDataURL(file);
    }
    function confirmCrop() {
        const canvas = cropper.getCroppedCanvas({ width: 200, height: 200 });
        S.profile.avatar = canvas.toDataURL();
        save(); applyTheme(); closeModal('modal-cropper');
    }
    function saveSettings() {
        S.profile.name = document.getElementById('set-name').value;
        S.profile.sub = document.getElementById('set-sub').value;
        S.profile.title = document.getElementById('set-page-title').value;
        S.profile.bg = document.getElementById('set-bg-url').value;
        S.profile.opacity = document.getElementById('set-opacity').value;
        save(); applyTheme(); closeModal('modal-settings');
    }
    function openModal(id) {
        if(id === 'modal-settings') {
            document.getElementById('set-name').value = S.profile.name;
            document.getElementById('set-sub').value = S.profile.sub;
            document.getElementById('set-page-title').value = S.profile.title;
            document.getElementById('set-bg-url').value = S.profile.bg || '';
            document.getElementById('set-opacity').value = S.profile.opacity;
            document.getElementById('opacity-val').innerText = Math.round(S.profile.opacity * 100);
        }
        document.getElementById(id).classList.add('open');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    document.getElementById('set-opacity').oninput = function() { document.getElementById('opacity-val').innerText = Math.round(this.value * 100); };
</script>
</body>
</html>
