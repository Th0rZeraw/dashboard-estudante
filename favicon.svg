<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Super minimalist style (Google-inspired), white only -->

  <!-- Pencil (diagonal, center) -->
  <rect x="28" y="10" width="8" height="36" rx="1" fill="white" transform="rotate(-15 32 32)"/>
  <!-- Pencil tip -->
  <polygon points="28,46 36,46 32,54" fill="white" transform="rotate(-15 32 32)"/>
  <!-- Pencil eraser band -->
  <rect x="28" y="12" width="8" height="3" rx="0.5" fill="white" opacity="0.5" transform="rotate(-15 32 32)"/>

  <!-- Stethoscope tubing - draped around the pencil like around a neck -->
  <path d="M 18 22 Q 14 32, 18 42 Q 22 50, 28 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 46 22 Q 50 32, 46 42 Q 42 50, 36 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stethoscope earpieces -->
  <circle cx="18" cy="20" r="2.5" fill="white"/>
  <circle cx="46" cy="20" r="2.5" fill="white"/>

  <!-- Stethoscope Y-connector at top -->
  <path d="M 18 22 Q 25 18, 32 16 Q 39 18, 46 22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stethoscope chest piece (bottom) -->
  <path d="M 28 52 Q 32 56, 36 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="56" r="4" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="32" cy="56" r="1.5" fill="white"/>
</svg>